services:

  # ─── PHP / Symfony App ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: hireiq_app
    volumes:
      - ./app:/var/www/app
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://hireiq:hireiq@postgres:5432/hireiq?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_KEY: hireiq
      S3_SECRET: hireiq123
      S3_BUCKET: hireiq-documents
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - hireiq

  # ─── Nginx ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hireiq_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hireiq

  # ─── PostgreSQL + pgvector ───────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hireiq_postgres
    environment:
      POSTGRES_DB: hireiq
      POSTGRES_USER: hireiq
      POSTGRES_PASSWORD: hireiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - hireiq

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hireiq_redis
    ports:
      - "6379:6379"
    networks:
      - hireiq

  # ─── MinIO (local S3 for file storage) ───────────────────────────
  minio:
    image: minio/minio
    container_name: hireiq_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hireiq
      MINIO_ROOT_PASSWORD: hireiq123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web console → http://localhost:9001
    networks:
      - hireiq

  # ─── Symfony Messenger Worker (async queue) ───────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: hireiq_worker
    command: php /var/www/app/bin/console messenger:consume async --limit=100 -vv
    volumes:
      - ./app:/var/www/app
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://hireiq:hireiq@postgres:5432/hireiq?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - hireiq

volumes:
  postgres_data:
  minio_data:

networks:
  hireiq:
    driver: bridge
